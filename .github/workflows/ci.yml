name: ci
on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: install hidapi
        run: sudo apt-get update && sudo apt-get install -y libhidapi-dev libudev-dev libusb-1.0-0-dev
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race -count=1 ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: install hidapi
        run: sudo apt-get update && sudo apt-get install -y libhidapi-dev libudev-dev libusb-1.0-0-dev
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest
